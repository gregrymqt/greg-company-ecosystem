worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Portal
    server {
        listen 80;
        server_name gregcompany.local localhost;

        location / {
            proxy_pass http://frontend-portal:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Admin
    server {
        listen 80;
        server_name admin.gregcompany.local;

        location / {
            proxy_pass http://frontend-admin:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # API & Bot (SSE Stream)
    server {
        listen 80;
        server_name api.gregcompany.local;

        # Intercepta e não faz buffering do Bot SSE
        location /api/v1/demo/stream {
            proxy_pass http://ecommerce-bot:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # SSE Configuration (Crucial)
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
            chunked_transfer_encoding on;
        }

        # Rota genérica para API .NET
        location / {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
