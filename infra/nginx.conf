worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # 💡 DEFINE O DNS INTERNO DO DOCKER (OBRIGATÓRIO PARA USAR VARIÁVEIS NO PROXY_PASS)
    resolver 127.0.0.11 valid=30s;

    # --- REGRA 1: TRÁFEGO DO PORTAL ---
    server {
    listen 80;
    server_name gregcompany.local;

    location / {
        # 5173 é a porta padrão do seu Vite no Portal
        set $portal_upstream http://host.docker.internal:5173; 
        proxy_pass $portal_upstream; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Regra do Admin (Rodando no terminal Windows)
server {
    listen 80;
    server_name admin.gregcompany.local;

    location / {
        # 5174 é a porta padrão do seu Vite no Admin
        set $admin_upstream http://host.docker.internal:5174;
        proxy_pass $admin_upstream;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
    # --- REGRA 3: TRÁFEGO DA API (.NET 8) ---
    server {
        listen 80;
        server_name api.gregcompany.local;

        location / {
            # 💡 Dica extra: Use o nome do serviço do compose "backend" ou "backend-api"
            set $backend_upstream http://backend-api:8080;
            proxy_pass $backend_upstream; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Suporte a WebSockets (SignalR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}