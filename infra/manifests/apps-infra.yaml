# =============================================================
# 3. BACKEND API (.NET 8) - Deployment & Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: api-app
          image: infra-backend:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
          # Probes garantem resiliência de inicialização e saúde do Pod
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: ConnectionStrings__PostgresTransaction
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: POSTGRES_TRANSACTION_CONNECTION_STRING
            - name: ConnectionStrings__PostgresSession
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: POSTGRES_SESSION_CONNECTION_STRING
            - name: ConnectionStrings__Redis
              value: "redis-service:6379"
            - name: ConnectionStrings__RabbitMq
              value: "amqp://guest:guest@rabbitmq-service:5672/"
          envFrom:
            - secretRef:
                name: greg-api-secrets
          volumeMounts:
            - name: api-uploads
              mountPath: /app/wwwroot/uploads
            - name: api-logs
              mountPath: /app/logs
      volumes:
        - name: api-uploads
          emptyDir: {}
        - name: api-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
  namespace: greg-company
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: backend-api

---
# =============================================================
# 4. ECOMMERCE BOT (PYTHON FASTAPI) - Deployment & Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-bot-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-bot
  template:
    metadata:
      labels:
        app: ecommerce-bot
    spec:
      containers:
        - name: bot-app
          image: ecommerce-bot:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: POSTGRES_URI
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: POSTGRES_TRANSACTION_CONNECTION_STRING
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq-service:5672/"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-bot-service
  namespace: greg-company
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: ecommerce-bot

---
# =============================================================
# 5. GO WORKER - Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-worker-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-worker
  template:
    metadata:
      labels:
        app: go-worker
    spec:
      containers:
        - name: go-worker-app
          image: infra-go-worker:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq-service:5672/"
            - name: SUPABASE_S3_URL
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: EndPoint_S3
          envFrom:
            - secretRef:
                name: greg-api-secrets