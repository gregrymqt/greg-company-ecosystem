# ==============================================================================
# ALERTA TÉCNICO: O caminho final do certificado CA do Supabase dentro de todos os
# containers será obrigatoriamente '/app/certs/supabase-ca.crt'.
# As strings de conexão do banco de dados devem incluir os parâmetros de
# validação 'VerifyCA' (ou equivalentes dependendo do driver de conexão).
# ==============================================================================

# =============================================================
# 1. BACKEND API (.NET 8) - Deployment & Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: api-app
          image: infra-backend:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
          # Probes garantem resiliência de inicialização e saúde do Pod
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: ConnectionStrings__PostgresTransaction
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: POSTGRES_TRANSACTION_CONNECTION_STRING
            - name: ConnectionStrings__PostgresSession
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: POSTGRES_SESSION_CONNECTION_STRING
            - name: ConnectionStrings__RabbitMq
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: RABBITMQ_URL
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: REDIS_PASSWORD
          envFrom:
            - secretRef:
                name: greg-api-secrets
            - configMapRef:
                name: greg-configmap
          volumeMounts:
            - name: api-uploads
              mountPath: /app/wwwroot/uploads
            - name: api-logs
              mountPath: /app/logs
            - name: supabase-cert-volume
              mountPath: /app/certs
              readOnly: true
      volumes:
        - name: api-uploads
          emptyDir: {}
        - name: api-logs
          emptyDir: {}
        - name: supabase-cert-volume
          secret:
            secretName: greg-api-secrets
            items:
            - key: SUPABASE_CA_CERT
              path: supabase-ca.crt
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
  namespace: greg-company
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: backend-api

---
# =============================================================
# 2. GO WORKER - Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-worker-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-worker
  template:
    metadata:
      labels:
        app: go-worker
    spec:
      containers:
        - name: go-worker-app
          image: infra-go-worker:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: RABBITMQ_URL
            - name: SUPABASE_S3_URL
              valueFrom:
                configMapKeyRef:
                  name: greg-configmap
                  key: EndPoint_S3
          envFrom:
            - secretRef:
                name: greg-api-secrets
          volumeMounts:
            - name: supabase-cert-volume
              mountPath: /app/certs
              readOnly: true
      volumes:
        - name: supabase-cert-volume
          secret:
            secretName: greg-api-secrets
            items:
            - key: SUPABASE_CA_CERT
              path: supabase-ca.crt