# =============================================================
# 3. BACKEND API (.NET 8) - Deployment & Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: api-app
          image: infra-backend:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__MongoConnection
              value: "mongodb://mongo-service:27017"
            - name: ConnectionStrings__Redis
              value: "redis-service:6379"
            - name: ConnectionStrings__RabbitMq
              value: "amqp://guest:guest@rabbitmq-service:5672/"
          envFrom:
            - secretRef:
                name: greg-api-secrets
          volumeMounts:
            - name: api-uploads
              mountPath: /app/wwwroot/uploads
            - name: api-logs
              mountPath: /app/logs
      volumes:
        - name: api-uploads
          emptyDir: {}
        - name: api-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api-service
  namespace: greg-company
spec:
  type: ClusterIP
  ports:
    - port: 8080 # Mantemos a mesma porta estável para facilitar o roteamento
      targetPort: 8080 #
  selector:
    app: backend-api
---
# =============================================================
# 5. GO WORKER - Deployment
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-worker-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-worker
  template:
    metadata:
      labels:
        app: go-worker
    spec:
      containers:
        - name: go-worker-app
          image: infra-go-worker:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq-service:5672/"
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: SendGrid__ApiKey
            - name: SENDGRID_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: SendGrid__FromEmail
            - name: SENDGRID_FROM_NAME
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: SendGrid__FromName
            - name: SUPABASE_S3_URL
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: EndPoint_S3
                  optional: true
            - name: SUPABASE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: Access_key_ID
                  optional: true
            - name: SUPABASE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: greg-api-secrets
                  key: Secret_Access_key
                  optional: true
