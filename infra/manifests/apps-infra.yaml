  selector:
    matchLabels:
      app: backend-worker
  template:
    metadata:
      labels:
        app: backend-worker
    spec:
      containers:
        - name: worker-app
          image: infra-worker:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            env:
            - name: ConnectionStrings__MongoConnection
              value: "mongodb://mongo-service:27017"
            - name: ConnectionStrings__Redis
              value: "redis-service:6379"
            - name: ConnectionStrings__RabbitMq
              value: "amqp://guest:guest@rabbitmq-service:5672/"
          envFrom:
            - secretRef:
                name: greg-api-secrets 
          volumeMounts:    
            - name: worker-logs
              mountPath: /app/logs
            -
      volumes:
        - name: worker-logs
          emptyDir: {}    
---  
apiVersion: v1
kind: Service
metadata:
  name: backend-worker-service
  namespace: greg-company
spec:
  type: ClusterIP
  ports:
    - port: 8080 # Mantemos a mesma porta estável para facilitar o roteamento
      targetPort: 8080 #
  selector:
    app: backend-worker            
