# =============================================================
# 1. PORTAL (FRONTEND) - Deployment & Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal-app
          image: infra-frontend-portal:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          ports:
            - containerPort: 8080 # Alinhado com o Nginx Unprivileged de Produção
---
apiVersion: v1
kind: Service
metadata:
  name: portal-service
  namespace: greg-company
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: portal

---
