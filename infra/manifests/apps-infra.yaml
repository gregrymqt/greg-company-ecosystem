# =============================================================
# 1. PORTAL (FRONTEND VITE) - Deployment & Service
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-deployment
  namespace: greg-company
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal-app
          # ⚠️ Substituído para usar sua imagem local
          image: infra-frontend-portal:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "150m"
              memory: "128Mi"
          ports:
            - containerPort: 5173 # Porta padrão do Vite no Portal
---
apiVersion: v1
kind: Service
metadata:
  name: portal-service
  namespace: greg-company
spec:
  type: ClusterIP # Fica isolado dentro do cluster, o Ingress fará o papel de expor
  ports:
    - port: 80 # Porta que o Service escuta internamente
      targetPort: 5173 # Porta para onde ele redireciona dentro do container
  selector:
    app: portal

---
