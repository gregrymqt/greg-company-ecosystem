apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greg-company-ingress
  namespace: greg-company
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/control-chunked-transfer-encoding: "on"
spec:
  tls:
  - hosts:
    - api.gregcompany.com
    secretName: gregcompany-api-tls
  rules:
  - host: api.gregcompany.com
    http:
      paths:
      - path: /api/v1/demo/stream
        pathType: Exact
        backend:
          service:
            name: ecommerce-bot-service
            port:
              number: 8000
      - path: /api/v1/demo
        pathType: Prefix
        backend:
          service:
            name: ecommerce-bot-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-api-service
            port:
              number: 8080