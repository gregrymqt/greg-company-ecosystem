# ==========================================================
# GREG COMPANY - INFRASTRUCTURE ORCHESTRATION (V2.2)
# Stack: .NET Core | React | Go | Python | MongoDB | Redis | RabbitMQ
# Security Level: Hardened / Least Privilege
# ==========================================================

services:

  # --- [ INFRASTRUCTURE & DATA LAYER ] ---

  mongodb:
    image: mongo:7.0
    container_name: mongodb-store
    volumes:
      - mongo-data:/data/db
    networks:
      - data-net
    restart: always

  redis:
    image: "redis:7-alpine"
    container_name: redis-cache
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - data-net
    restart: always

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-broker
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672" # Protegido limitando o bind ao host local
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - backend-net
      - data-net
    restart: always

  # --- [ GATEWAY PROXY LAYER ] ---

  proxy-gateway:
    image: nginx:alpine
    container_name: proxy-gateway
    ports:
      - "80:80" # Única porta pública de entrada do ecossistema inteiro!
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-portal
      - frontend-admin
      - backend
      - ecommerce-bot
    networks:
      - frontend-net
      - backend-net
    restart: always

  # --- [ APPLICATION LAYER ] ---

  backend:
    container_name: backend-api
    build: 
      context: ../backend
      dockerfile: Dockerfile
    expose:
      - "8080" # Alinhado com o usuário não-root do .NET 8
    env_file:
      - ../.env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__MongoConnection=mongodb://mongodb:27017
      - MongoDb__DatabaseName=${MONGO_DATABASE_NAME}
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672/
      - MercadoPago__AccessToken=${MercadoPago__AccessToken}
      - MercadoPago__WebhookSecret=${MercadoPago__WebhookSecret}
      - MercadoPago__PublicKey=${MercadoPago__PublicKey}
      - Jwt__Key=${Jwt__Key}
      - General__BaseUrl=${GENERAL__BASEURL}
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - backend-net
      - data-net
    volumes:
      - ../uploads:/app/wwwroot/uploads
      - ../logs:/app/logs    

  go-worker:
    container_name: go-worker
    build: 
      context: ../go-worker
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - SUPABASE_S3_URL=${EndPoint_S3}
    depends_on:
      rabbitmq:
        condition: service_started
    networks:
      - backend-net # Precisa de saída externa para falar com o Supabase/SendGrid via Internet

  ecommerce-bot:
    container_name: ecommerce-bot
    build: 
      context: ../ecommerce-bot
      dockerfile: Dockerfile
    expose:
      - "8000" # Exposto internamente para o proxy-gateway consumir o SSE stream
    env_file:
      - ../.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=${MONGO_DATABASE_NAME}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - AES_MASTER_KEY=${AES_MASTER_KEY}
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - backend-net
      - data-net

  frontend-portal:
    container_name: frontend-portal
    build:
      context: ../portal
      dockerfile: Dockerfile
      args:
        - GENERAL_BASEURL=${GENERAL__BASEURL}
    expose:
      - "8080" # Atualizado! Imagem não-root responde na 8080
    networks:
      - frontend-net

  frontend-admin:
    container_name: frontend-admin
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        - GENERAL_BASEURL=${GENERAL__BASEURL}
    expose:
      - "8080" # Atualizado! Imagem não-root responde na 8080
    networks:
      - frontend-net

# --- [ NETWORKING & PERSISTENCE DIAGRAM ] ---

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge
    internal: true # Bloqueia qualquer tráfego que não venha das redes mapeadas acima

volumes:
  mongo-data:
  redis-data:
  rabbitmq-data: