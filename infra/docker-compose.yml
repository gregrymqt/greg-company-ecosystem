# ==========================================================
# GREG COMPANY - INFRASTRUCTURE ORCHESTRATION (V2.1)
# Stack: .NET Core | React | SQL Server | MongoDB | Redis | Nginx
# Modo: Hybrid (Secure by default / Dev ready)
# ==========================================================

services:

  # --- [ INFRASTRUCTURE LAYER ] ---

  postgres:
    image: "postgres:16-alpine"
    container_name: postgres-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - greg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greg_company"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  mongodb:
    image: mongo:latest
    container_name: mongodb-store
    volumes:
      - mongo-data:/data/db
    networks:
      - greg-network
    restart: always

  redis:
    image: "redis:latest"
    container_name: redis-cache
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - greg-network
    restart: always

  # --- [ GATEWAY PROXY LAYER ] ---

  proxy-gateway:
    image: nginx:alpine
    container_name: proxy-gateway
    ports:
      - "80:80" # Única porta pública de entrada do ecossistema inteiro!
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # Injeta as regras do porteiro
    depends_on:
      - frontend-portal
      - frontend-admin
      - backend
    networks:
      - greg-network
    restart: always

  # --- [ APPLICATION LAYER ] ---

  backend:
    container_name: backend-api
    build: 
      context: ../backend
      dockerfile: Dockerfile
    expose:
      - "8080" # Fechado para fora, acessível apenas pelo Nginx internamente
    env_file:
      - ../.env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - ConnectionStrings__MongoConnection=${MONGO_CONNECTION_STRING}
      - ConnectionStrings__Redis=${ConnectionStrings__Redis}
      - MercadoPago__AccessToken=${MercadoPago__AccessToken}
      - MercadoPago__WebhookSecret=${MercadoPago__WebhookSecret}
      - MercadoPago__PublicKey=${MercadoPago__PublicKey}
      - Jwt__Key=${Jwt__Key}
      - Google__ClientId=${Google__ClientId}
      - Google__ClientSecret=${Google__ClientSecret}
      - SendGrid__ApiKey=${SendGrid__ApiKey}
      - SendGrid__FromEmail=${SendGrid__FromEmail}
      - SendGrid__FromName=${SendGrid__FromName}
      - General__BaseUrl=${VITE_GENERAL__BASEURL}
      - USE_REDIS=${USE_REDIS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    networks:
      - greg-network
    volumes:
      - ../uploads:/app/wwwroot/uploads
      - ../logs:/app/logs    

  frontend-portal:
    container_name: frontend-portal
    build:
      context: ../portal
      dockerfile: Dockerfile
      args:
        - VITE_GENERAL_BASEURL=${VITE_GENERAL__BASEURL}
    expose:
      - "80" # Fechado para fora, acessível apenas pelo Nginx internamente
    depends_on:
      - backend
    networks:
      - greg-network

  frontend-admin:
    container_name: frontend-admin
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        - VITE_GENERAL_BASEURL=${VITE_GENERAL__BASEURL}
    expose:
      - "80" # Fechado para fora, acessível apenas pelo Nginx internamente
    depends_on:
      - backend
    networks:
      - greg-network

# --- [ NETWORKING & PERSISTENCE ] ---

networks:
  greg-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data: