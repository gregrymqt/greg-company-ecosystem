version: '3.8'

services:
  backend:
    container_name: backend-api-local
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5045:8080"
    env_file:
      - ../.env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - General__BaseUrl=http://localhost:5173
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__PostgresTransaction=Host=postgres;Port=5432;Database=greg_company;Username=postgres;Password=postgres;
      - ConnectionStrings__PostgresSession=Host=postgres;Port=5432;Database=greg_company;Username=postgres;Password=postgres;
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greg_company
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

volumes:
  postgres-data:
