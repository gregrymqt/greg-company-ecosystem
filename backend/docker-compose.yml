version: '3.8'

services:
  backend:
    container_name: backend-api-local
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5045:8080"
    env_file:
      - ../.env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - General__BaseUrl=http://localhost:5173
    depends_on:
      - redis
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
