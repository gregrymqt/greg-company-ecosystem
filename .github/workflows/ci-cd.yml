name: Greg Company - CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy (staging | production)"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
  MONGO_CONNECTION_STRING: ${{ secrets.MONGO_CONNECTION_STRING }}
  ConnectionStrings__Redis: ${{ secrets.REDIS_CONNECTION_STRING }}
  MercadoPago__AccessToken: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
  JWT__Secret: ${{ secrets.JWT_SECRET }}

jobs:
  # -------------------------------------------------------
  # JOB 1: Build & Unit Tests
  # Executa o docker-compose.test.yml para rodar os testes
  # -------------------------------------------------------
  test:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Criar arquivo .env para testes
        run: |
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" >> .env
          echo "MONGO_CONNECTION_STRING=${{ secrets.MONGO_CONNECTION_STRING }}" >> .env
          echo "ConnectionStrings__Redis=${{ secrets.REDIS_CONNECTION_STRING }}" >> .env

      - name: Build e execução dos testes (docker-compose.test.yml)
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from tests

      - name: Limpar containers de teste
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes --remove-orphans

  # -------------------------------------------------------
  # JOB 2: Build & Deploy (Stack Completa)
  # Executa o docker-compose.yml principal após os testes
  # -------------------------------------------------------
  deploy:
    name: Build & Deploy Stack Completa
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Criar arquivo .env de produção
        run: |
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}" >> .env
          echo "MONGO_CONNECTION_STRING=${{ secrets.MONGO_CONNECTION_STRING }}" >> .env
          echo "ConnectionStrings__Redis=${{ secrets.REDIS_CONNECTION_STRING }}" >> .env
          echo "MercadoPago__AccessToken=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}" >> .env
          echo "JWT__Secret=${{ secrets.JWT_SECRET }}" >> .env

      - name: Build da stack completa (docker-compose.yml)
        run: docker compose -f docker-compose.yml build

      - name: Subir stack completa
        run: docker compose -f docker-compose.yml up -d

      - name: Verificar status dos containers
        run: docker compose -f docker-compose.yml ps
